models:
  - name: stg_stripe___payments
    description: Staged payment data, one row for each completed payment.
    columns:
      - name: payment_id
        description: Primary Key
        data_tests:
          - unique
          - not_null
      - name: order_id
        description: ??
        data_tests:
          - not_null
          - relationships:
              arguments:
                field: order_id
                to: ref('stg_jaffle_shop___orders')
        