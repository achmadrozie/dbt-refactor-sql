models:
  - name: stg_jaffle_shop__customers
    description: Staged customers data, one row per customer
    columns:
      - name: customer_id
        description: Primary key
        data_tests:
          - unique
          - not_null
      - name: customer_first_name
        description: Customer first name
      - name: customer_last_name
        description: Customer last name

  - name: stg_jaffle_shop__orders
    description: Staged orders data, one row per order
    columns:
      - name: order_id
        description: Primary key
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: Foreign key to stg_jaffle_shop__customers
        data_tests:
          - relationships:
              arguments:
                field: customer_id
                to: ref('stg_jaffle_shop__customers')
      - name: order_status
        description: Status of the order
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - completed
                  - shipped
                  - returned
                  - placed
                  - return_pending