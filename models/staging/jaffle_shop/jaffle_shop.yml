models:
  - name: stg_jaffle_shop___customers
    description: '{{ doc("stg_jaffle_shop___customers") }}'
    columns:
      - name: customer_id
        description: '{{ doc("customer_id") }}'
        data_tests:
          - unique
          - not_null
      - name: customer_first_name
        description: '{{ doc("customer_first_name") }}'
      - name: customer_last_name
        description: '{{ doc("customer_last_name") }}'

  - name: stg_jaffle_shop___orders
    description: '{{ doc("stg_jaffle_shop___orders") }}'
    columns:
      - name: order_id
        description: '{{ doc("order_id") }}'
        data_tests:
          - unique
          - not_null
      - name: customer_id
        description: '{{ doc("customer_id") }}'
        data_tests:
          - relationships:
              arguments:
                field: customer_id
                to: ref('stg_jaffle_shop___customers')
      - name: order_status
        description: '{{ doc("order_status") }}'
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - completed
                  - shipped
                  - returned
                  - placed
                  - return_pending